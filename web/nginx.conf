server {
    listen 80;
    # 填所有的域名或者直接给 _ 监听所有发往该端口的请求
    server_name _;

    # 前端静态文件的存放目录 (由 dockerfile 中的 COPY 保证)
    root /usr/share/nginx/html;
    index index.html index.htm;

    # 1. 核心重点：配置前端 SPA（单页应用） History 路由机制
    # 任何如果找不到的文件或目录，都直接把请求回退返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 2. (可选) 直接通过 Nginx 处理跨域，请求转发给后端服务
    # 假设你的后端容器服务名为 "admin_api"，端口为3000
    #
    # location /api/ {
    #     proxy_pass http://admin_api:3000/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    # 防止别人查看隐秘文件
    location ~ /\. {
        deny all;
    }

    # 增加静态资源的高级缓存配置（企业级推荐，让浏览器缓存静态资源）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}
